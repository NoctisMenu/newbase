[sections.core.fields.accent_color]
type = "color"
widget_type = "colorpicker"
default = "#506883"
public = true
[sections.core.fields.accent_color.metadata]
display_name = "Accent Color"
description = "UI accent color"
category = "Appearance"

[sections.core.fields.accent_hex]
type = "string"
widget_type = "none"
default = ""
public = false
[sections.core.fields.accent_hex.metadata]
display_name = "Accent Hex (Internal)"
description = "Internal hex string storage"
category = "Internal"
